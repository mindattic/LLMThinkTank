<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>LLM Think Tank</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="LLMThinkTank.styles.css" />
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="theme.js"></script>
    <script>
        window.LLMThinkTank = window.LLMThinkTank || {};
        window.LLMThinkTank.isNearBottom = (el, thresholdPx) => {
            if (!el) return true;
            const threshold = thresholdPx ?? 60;
            return (el.scrollTop + el.clientHeight) >= (el.scrollHeight - threshold);
        };
        window.LLMThinkTank.scrollToBottom = (el) => {
            if (!el) return;
            el.scrollTop = el.scrollHeight;
        };
        window.LLMThinkTank.blurActive = () => {
            if (document.activeElement) document.activeElement.blur();
        };
    </script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
